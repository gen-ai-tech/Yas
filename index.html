<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAS Beauty & Fashion Studio | Redefining Elegance in Salem</title>
    <meta name="description" content="Salem's premier luxury boutique and makeover studio. Exquisite designer wear, bridal collections, and professional makeup artistry.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            50: '#fffcf2',
                            100: '#fff9e6',
                            200: '#ffefbf',
                            300: '#ffe199',
                            400: '#ffd273',
                            500: '#c5a059', // Elegant Gold
                            600: '#a6854a',
                            700: '#876c3c',
                            800: '#68532e',
                            900: '#493a20',
                        },
                        luxury: {
                            black: '#0a0a0a',
                            deep: '#121212',
                            glass: 'rgba(255, 255, 255, 0.05)',
                        }
                    },
                    fontFamily: {
                        heading: ['DM Sans', 'sans-serif'],
                        body: ['DM Sans', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        .parallax-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-nav {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(197, 160, 89, 0.2);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
        }

        .image-glow {
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.15);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #c5a059;
            border-radius: 10px;
        }

        .cormorant { font-family: 'DM Sans', sans-serif; }
        .inter { font-family: 'DM Sans', sans-serif; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal-left {
            opacity: 0;
            transform: translateX(-50px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal-right {
            opacity: 0;
            transform: translateX(50px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal.active, .reveal-left.active, .reveal-right.active {
            opacity: 1;
            transform: translate(0, 0);
        }

        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hover-lift:hover {
            transform: translateY(-10px) scale(1.02);
        }

        /* ── Mobile Menu ── */
        .mobile-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 190;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .mobile-backdrop.open {
            opacity: 1;
            pointer-events: all;
        }
        .mobile-menu {
            position: fixed;
            top: 0;
            right: 0;
            width: min(80vw, 300px);
            height: 100vh;
            background: rgba(10,10,10,0.97);
            border-left: 1px solid rgba(197,160,89,0.2);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
            display: flex;
            flex-direction: column;
            padding: 5rem 2rem 2.5rem;
            overflow-y: auto;
            overscroll-behavior: contain;
            gap: 0;
        }
        .mobile-menu.open {
            transform: translateX(0);
        }
        .mobile-menu a {
            display: block;
            padding: 1rem 0;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            transition: color 0.25s ease;
        }
        .mobile-menu a:hover { color: #c5a059; }
        .mobile-menu .mob-book {
            margin-top: 2rem;
            background: #c5a059;
            color: #0a0a0a;
            text-align: center;
            padding: 0.85rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            border-bottom: none;
        }
        .mobile-menu .mob-book:hover { background: #a6854a; color: #fff; }

        /* ── Global Responsive Overrides ── */
        @media (max-width: 768px) {
            /* Hero */
            #home { padding-top: 5rem !important; padding-bottom: 3rem; }
            #home .max-w-7xl { grid-template-columns: 1fr !important; gap: 2.5rem; }
            #home h1 { font-size: clamp(2.8rem, 12vw, 5rem) !important; }
            #home .aspect-\[4\/5\] { max-width: 100% !important; aspect-ratio: 4/5; }

            /* About */
            #about { padding-top: 4rem !important; padding-bottom: 4rem !important; }
            #about .max-w-7xl { grid-template-columns: 1fr !important; gap: 3rem; }
            #about h3 { font-size: clamp(2rem, 8vw, 3.5rem) !important; }

            /* Services */
            #services { padding-top: 4rem !important; padding-bottom: 4rem !important; }
            #services h3 { font-size: clamp(1.8rem, 7vw, 3rem) !important; }
            #services .grid { grid-template-columns: repeat(2, 1fr) !important; gap: 0.75rem !important; }

            /* Contact */
            #contact { padding-top: 4rem !important; padding-bottom: 4rem !important; }
            #contact .grid { grid-template-columns: 1fr !important; gap: 2.5rem; }
            #contact h3 { font-size: clamp(2rem, 8vw, 3.5rem) !important; }
            #contact .h-\[500px\] { height: 300px !important; }

            /* Footer */
            footer .flex { flex-direction: column; align-items: center; text-align: center; gap: 1.5rem; }

            /* Hover-lift disabled on touch */
            .hover-lift:hover { transform: none; }
        }

        @media (max-width: 480px) {
            #services .grid { grid-template-columns: 1fr !important; }
            #home h1 { font-size: clamp(2.4rem, 11vw, 3.5rem) !important; }
        }
    </style>

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="parallax-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Components ---

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Prevent body scroll when menu open
            useEffect(() => {
                document.body.style.overflow = menuOpen ? 'hidden' : '';
                return () => { document.body.style.overflow = ''; };
            }, [menuOpen]);

            const navLinks = ['Home', 'About', 'Services', 'Reviews', 'Contact'];

            return (
                <>
                    {/* Backdrop */}
                    <div
                        className={`mobile-backdrop ${menuOpen ? 'open' : ''}`}
                        onClick={() => setMenuOpen(false)}
                    />

                    {/* Mobile Slide Menu */}
                    <div className={`mobile-menu ${menuOpen ? 'open' : ''}`}>
                        {/* Close Button */}
                        <button
                            onClick={() => setMenuOpen(false)}
                            style={{
                                position: 'absolute', top: '1.25rem', right: '1.25rem',
                                background: 'rgba(197,160,89,0.12)', border: '1px solid rgba(197,160,89,0.3)',
                                borderRadius: '50%', width: 40, height: 40, cursor: 'pointer',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                color: '#c5a059', fontSize: '1.2rem', lineHeight: 1
                            }}
                            aria-label="Close menu"
                        >
                            ✕
                        </button>
                        {/* Brand in menu */}
                        <span style={{ fontSize: '1.4rem', fontWeight: 700, letterSpacing: '0.2em', color: '#c5a059', marginBottom: '1rem', display: 'block' }}>YAS</span>
                        <span style={{ fontSize: '0.65rem', letterSpacing: '0.25em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: '1.5rem', display: 'block' }}>Beauty Parlour & Fashion Studio</span>

                        {navLinks.map(item => (
                            <a
                                key={item}
                                href={`#${item.toLowerCase()}`}
                                onClick={() => setMenuOpen(false)}
                            >
                                {item}
                            </a>
                        ))}

                        <a
                            href="https://wa.me/919787383956?text=Hello%20YAS%20Studio!%20I%27d%20like%20to%20book%20an%20appointment%20or%20know%20more%20about%20your%20services."
                            target="_blank"
                            className="mob-book"
                            onClick={() => setMenuOpen(false)}
                        >
                            Book Now
                        </a>
                    </div>

                    {/* Main Navbar */}
                    <nav className={`fixed top-0 left-0 w-full transition-all duration-500 ${isScrolled ? 'glass-nav py-3' : 'bg-transparent py-5'}`} style={{zIndex: 100}}>
                        <div className="max-w-[1400px] mx-auto px-4 flex justify-between items-center">
                            {/* Logo */}
                            <div className="flex items-center gap-3">
                                <img src="logo.png" alt="YAS Studio Logo" className="h-10 w-auto object-contain rounded-lg" />
                                <div className="flex flex-col">
                                    <span className="text-xl font-heading font-bold tracking-widest text-gold-500 leading-none">YAS</span>
                                    <span className="text-[8px] tracking-[0.2em] uppercase opacity-60 hidden sm:block">Beauty & Fashion Studio</span>
                                </div>
                            </div>

                            {/* Desktop Links */}
                            <div className="hidden md:flex items-center gap-10">
                                {navLinks.map(item => (
                                    <a
                                        key={item}
                                        href={`#${item.toLowerCase()}`}
                                        className="text-sm uppercase tracking-widest hover:text-gold-500 transition-colors"
                                    >
                                        {item}
                                    </a>
                                ))}
                            </div>

                            {/* Right side */}
                            <div className="flex items-center gap-3">
                                <a
                                    href="https://wa.me/919787383956?text=Hello%20YAS%20Studio!%20I%27d%20like%20to%20book%20an%20appointment%20or%20know%20more%20about%20your%20services."
                                    target="_blank"
                                    className="bg-gold-500 text-luxury-black px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:scale-105 active:scale-95 transition-all hidden sm:inline-flex"
                                >
                                    Book Now
                                </a>

                                {/* Hamburger — mobile only */}
                                <button
                                    id="hamburger-btn"
                                    onClick={() => setMenuOpen(true)}
                                    className="md:hidden flex flex-col justify-center items-center gap-[5px] w-10 h-10 rounded-lg"
                                    style={{ background: 'rgba(197,160,89,0.12)', border: '1px solid rgba(197,160,89,0.25)', cursor: 'pointer' }}
                                    aria-label="Open menu"
                                >
                                    <span style={{ display: 'block', width: 20, height: 2, background: '#c5a059', borderRadius: 2, transition: 'all 0.3s' }} />
                                    <span style={{ display: 'block', width: 14, height: 2, background: '#c5a059', borderRadius: 2, transition: 'all 0.3s' }} />
                                    <span style={{ display: 'block', width: 20, height: 2, background: '#c5a059', borderRadius: 2, transition: 'all 0.3s' }} />
                                </button>
                            </div>
                        </div>
                    </nav>
                </>
            );
        };

        const Hero = () => {
            return (
                <section id="home" className="min-h-screen flex items-center pt-20 px-4">
                    <div className="max-w-[1400px] mx-auto w-full grid lg:grid-cols-2 gap-12 items-center">
                        <div className="space-y-8 animate-[fadeIn_1s_ease-out]">
                            <div className="space-y-2">
                                <span className="text-gold-500 tracking-[0.2em] text-lg font-medium block mb-4">Premium Parlour & Couture Studio</span>
                                <h1 className="text-6xl md:text-8xl font-heading font-medium leading-tight text-glow">
                                    Eternal <br/> <span className="italic text-gold-500">Beauty</span>
                                </h1>
                            </div>

                            <div className="space-y-6 max-w-lg">
                                {[
                                    { icon: 'sparkles', text: 'Bridal Makeovers & Couture' },
                                    { icon: 'scissors', text: 'Advanced Hair & Skin Treatments' },
                                    { icon: 'star', text: 'Exclusive Designer Collections' }
                                ].map((item, i) => (
                                    <div key={i} className="flex items-center gap-4 group">
                                        <div className="w-10 h-10 rounded-full glass flex items-center justify-center group-hover:bg-gold-500 group-hover:text-luxury-black transition-all">
                                            <Icon name={item.icon} size={18} />
                                        </div>
                                        <p className="text-lg tracking-wide opacity-80">{item.text}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="relative flex justify-center lg:justify-end">
                            <div className="relative w-full max-w-[500px] aspect-[4/5]">
                                <div className="absolute inset-0 border-2 border-gold-500/30 -m-4"></div>
                                <div className="absolute inset-0 border-2 border-gold-500/30 m-4"></div>
                                <img 
                                    src="image.png" 
                                    alt="YAS Bridal Look"
                                    className="w-full h-full object-cover grayscale-[10%] hover:grayscale-0 transition-all duration-700"
                                />
                                <div className="absolute bottom-0 left-0 p-8 w-full bg-gradient-to-t from-black/80 to-transparent">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const About = () => {
            const sectionRef = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            entry.target.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(el => el.classList.add('active'));
                        }
                    });
                }, { threshold: 0.05, rootMargin: '0px 0px -100px 0px' });
                
                if (sectionRef.current) {
                    observer.observe(sectionRef.current);
                    sectionRef.current.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(el => observer.observe(el));
                }
                return () => observer.disconnect();
            }, []);

            return (
                <section id="about" className="py-32 px-4">
                    <div ref={sectionRef} className="max-w-[1400px] mx-auto grid lg:grid-cols-2 gap-20 items-center">
                        <div className="relative reveal reveal-left">
                            <div className="absolute -inset-4 bg-gold-500/10 blur-3xl rounded-full"></div>
                            <img 
                                src="image1.png" 
                                alt="YAS Studio"
                                className="relative rounded-2xl image-glow w-full aspect-square object-cover"
                            />
                            <div className="absolute -bottom-10 -right-10 glass p-8 hidden md:block hover-lift">
                                <p className="text-4xl font-heading font-bold text-white">15+</p>
                                <p className="text-xs uppercase tracking-widest opacity-60">Years of Luxury</p>
                            </div>
                        </div>

                        <div className="space-y-8 reveal reveal-right">
                            <div className="space-y-4">
                                <h2 className="text-gold-500 tracking-[0.3em] uppercase text-lg font-bold">About Yas Studio</h2>
                                <h3 className="text-5xl md:text-6xl font-heading leading-tight">Salem's Luxury <br/> Beauty & Fashion Hub</h3>
                            </div>
                            
                            <div className="space-y-6 text-lg opacity-70 font-light leading-relaxed">
                                <p>
                                    YAS Beauty & Fashion Studio is Salem's premier destination where world-class beauty treatments meet high-end couture. We believe that true elegance is a blend of flawless skin, perfect styling, and exquisite attire.
                                </p>
                                <p>
                                    Whether you're looking for a relaxing Hair Spa, an advanced O3+ Facial, or a bespoke Designer Lehenga for your big day, our expert stylists and artisans are here to deliver excellence with every touch.
                                </p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Services = () => {
            const sectionRef = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            entry.target.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
                        }
                    });
                }, { threshold: 0.05, rootMargin: '0px 0px -100px 0px' });
                
                if (sectionRef.current) {
                    observer.observe(sectionRef.current);
                    sectionRef.current.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                }
                return () => observer.disconnect();
            }, []);

            const services = [
                { 
                    title: 'Bridal Makeovers', 
                    img: 'https://images.unsplash.com/photo-1669257965114-225af79f3455?w=600&auto=format&fit=crop&q=60',
                    details: [
                        { name: 'HD & Airbrush Makeup', info: 'Long-lasting, camera-ready finishes.' },
                        { name: 'Pre-Bridal Glow', info: 'Curated skin treatments in advance.' },
                        { name: 'Hairstyling & Draping', info: 'Traditional and modern drapes.' },
                        { name: 'Bridal Trials', info: 'Finalize your perfect wedding look.' }
                    ]
                },
                { 
                    title: 'Designer Lehengas', 
                    img: 'https://images.unsplash.com/photo-1707665231479-69e9fd2d4a7f?w=600&auto=format&fit=crop&q=60',
                    details: [
                        { name: 'Exclusive Couture', info: 'Handpicked bridal lehenga collection.' },
                        { name: 'Custom Tailoring', info: 'Bespoke fittings for perfect silhouettes.' },
                        { name: 'Style Consultation', info: 'Expert advice on jewelry pairing.' },
                        { name: 'Trend Designs', info: 'Silk to modern sequined glamor.' }
                    ]
                },
                { 
                    title: 'Advanced Skin Care', 
                    img: 'https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?auto=format&fit=crop&q=80&w=1000',
                    details: [
                        { name: 'Clinical Facials', info: 'HydraFacials and O3+ Glow protocols.' },
                        { name: 'Anti-Aging Therapy', info: 'Non-invasive collagen-boosting.' },
                        { name: 'Pigmentation Fix', info: 'Tan removal and even skin tone.' },
                        { name: 'Skin Diagnostics', info: 'Analysis for home-care routines.' }
                    ]
                },
                { 
                    title: 'Hair Artistry', 
                    img: 'https://images.unsplash.com/photo-1560869713-7d0a29430803?auto=format&fit=crop&q=80&w=1000',
                    details: [
                        { name: 'Global Coloring', info: 'Balayage, ombre, and fashion color.' },
                        { name: 'Texture Treatments', info: 'Keratin, Smoothening, and Hair Botox.' },
                        { name: 'Creative Cuts', info: 'Styles tailored to your face shape.' },
                        { name: 'Scalp Spa', info: 'Deep conditioning for healthy growth.' }
                    ]
                },
                { 
                    title: 'Nail & Body Spa', 
                    img: 'https://media.istockphoto.com/id/2263341159/photo/manicure-process-in-the-nail-salon.jpg?s=612x612&w=0&k=20&c=OrUQnL-9lfaMbm4CIIAgphAIUr4aYM9bSFhTXOZsiWU=',
                    details: [
                        { name: 'Nail Extensions', info: 'Durable, high-gloss enhancements.' },
                        { name: 'Nail Art', info: 'Hand-painted designs and 3D art.' },
                        { name: 'Luxury Mani-Pedi', info: 'Relaxing sessions with organic scrubs.' },
                        { name: 'Body Massage', info: 'Stress-relieving rejuvenation therapies.' }
                    ]
                },
                { 
                    title: 'Fashion Styling', 
                    img: 'https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=600&auto=format&fit=crop&q=60',
                    details: [
                        { name: 'Personal Shopper', info: 'Right pieces for any special event.' },
                        { name: 'Image Makeover', info: 'Head-to-toe hair and makeup styling.' },
                        { name: 'Shoot Styling', info: 'Specialized looks for portfolios.' },
                        { name: 'Wardrobe Audit', info: 'Creating a timeless personal style.' }
                    ]
                }
            ];

            return (
                <section id="services" className="py-32 px-4 bg-black/60">
                    <div ref={sectionRef} className="max-w-[1400px] mx-auto">
                        <div className="text-center mb-20 space-y-4 reveal">
                            <h2 className="text-gold-500 tracking-[0.3em] uppercase text-lg font-bold">The Expertise</h2>
                            <h3 className="text-5xl font-heading">Luxury Beauty & Fashion</h3>
                        </div>

                        <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8 max-w-5xl mx-auto">
                            {services.map((service, i) => (
                                <div 
                                    key={i} 
                                    className="group relative aspect-[3/4] overflow-hidden cursor-pointer reveal hover-lift" 
                                    style={{ transitionDelay: `${i * 100}ms` }}
                                >
                                    <img 
                                        src={service.img} 
                                        className="w-full h-full object-cover transition-all duration-1000 group-hover:scale-110 group-hover:blur-[2px] group-hover:brightness-[0.3]"
                                        alt={service.title}
                                    />

                                                <div key={index} className="space-y-0.5">

                                                    <p className="text-[9px] text-white/60 leading-tight">{detail.info}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Reviews = () => {
            const sectionRef = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            entry.target.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
                        }
                    });
                }, { threshold: 0.05, rootMargin: '0px 0px -100px 0px' });
                
                if (sectionRef.current) {
                    observer.observe(sectionRef.current);
                    sectionRef.current.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                }
                return () => observer.disconnect();
            }, []);

                {
                    name: "Priya Sharma",
                    role: "Bridal Client",
                    rating: 5,
                    comment: "The most incredible bridal makeover I could have asked for! The team at YAS Studio made me feel like a queen on my big day. The attention to detail is unmatched.",

                    name: "Anjali Krishnan",
                    role: "Couture Client",
                    rating: 5,
                    comment: "Found my dream lehenga here. The custom fitting was perfect, and the quality of work is truly luxury. Salem finally has a world-class fashion studio!",

                    name: "Deepa Rajan",
                    role: "Regular Member",

                        </div>

                        <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">

                                <div key={i} className="glass p-8 rounded-2xl flex flex-col justify-between hover-lift reveal" style={{ transitionDelay: `${i * 100}ms` }}>
                                    <div className="space-y-4">
                                        <div className="flex gap-1 text-gold-500">
                                            {[...Array(5)].map((_, starIndex) => (
                                                <Icon key={starIndex} name="star" size={16} className={starIndex < review.rating ? "fill-gold-500" : "opacity-30"} />
                                            ))}
                                        </div>
                                        <p className="text-white/80 italic leading-relaxed">"{review.comment}"</p>
                                    </div>
                                    <div className="mt-8 pt-6 border-t border-white/5 flex items-center justify-between">
                                        <div>
                                            <p className="font-bold text-white tracking-wide">{review.name}</p>
                                            <p className="text-[10px] uppercase tracking-widest text-gold-500">{review.role}</p>
                                        </div>
                                        <p className="text-[10px] opacity-40 uppercase">{review.date}</p>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Overall Rating Summary */}
                        <div className="mt-16 glass max-w-lg mx-auto p-6 rounded-full flex flex-col md:flex-row items-center justify-center gap-6 reveal">
                            <div className="flex items-center gap-3">
                                <span className="text-4xl font-bold text-gold-500">4.9</span>
                                <div className="space-y-0.5">
                                    <div className="flex gap-1 text-gold-500">
                                        {[...Array(5)].map((_, i) => <Icon key={i} name="star" size={14} className="fill-gold-500" />)}
                                    </div>
                                    <p className="text-[10px] uppercase tracking-[0.2em] opacity-50">Average Rating</p>

                            </div>
                            <div className="hidden md:block w-px h-10 bg-white/10"></div>
                            <p className="text-sm opacity-60 tracking-wide text-center md:text-left">
                                Based on <span className="text-white font-bold">500+</span> satisfied clients in Salem

                    </div>
                </section>

        };

                                    width="100%" 
                                    height="100%" 
                                    style={{ border: 0, filter: 'invert(90%) hue-rotate(180deg) contrast(90%)' }} 
                                    allowFullScreen="" 
                                    loading="lazy"
                                ></iframe>
                                <div className="absolute inset-0 pointer-events-none border-2 border-gold-500/20 rounded-2xl m-4 transition-all group-hover:m-2"></div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => {
            return (
                <footer className="py-20 px-4 border-t border-white/5">
                    <div className="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
                        <div className="text-center md:text-left flex flex-col items-center md:items-start gap-4">
                            <img src="yas/logo.png" alt="YAS Studio Logo" className="h-16 w-auto object-contain rounded-xl" />
                            <div>
                                <p className="text-xl font-heading font-bold text-gold-500 tracking-widest leading-tight">YAS STUDIO</p>
                                <p className="text-[10px] uppercase tracking-[0.3em] opacity-40">Salem's Fashion Hub</p>
                            </div>
                        </div>

                        <p className="text-[10px] uppercase tracking-widest opacity-40">
                            &copy; 2024 Yas Beauty & Fashion Studio. All Rights Reserved.
                        </p>
                    </div>
                </footer>
            );
        };

        const App = () => {
            useEffect(() => {
                // JSON-LD Local SEO
                const script = document.createElement('script');
                script.type = 'application/ld+json';
                script.text = JSON.stringify({
                    "@context": "https://schema.org",
                    "@type": "LocalBusiness",
                    "name": "YAS Beauty & Fashion Studio",
                    "image": "https://images.unsplash.com/photo-1558769132-cb1aea458c5e",
